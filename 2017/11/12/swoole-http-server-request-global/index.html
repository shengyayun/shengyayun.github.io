an></span><br><span class="line"><span class="comment"> * <span class="doctag">@author</span>      shengyayun&lt;719048774<span class="doctag">@qq</span>.com&gt;</span></span><br><span class="line"><span class="comment"> * <span class="doctag">@since</span>       2017/11/12 18:39</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line">$http = <span class="keyword">new</span> swoole_http_server(<span class="string">"127.0.0.1"</span>, <span class="number">9501</span>);</span><br><span class="line">$http-&gt;set(</span><br><span class="line">    [</span><br><span class="line">        <span class="string">'worker_num'</span> =&gt; <span class="number">2</span>,<span class="comment">//开启2个worker进程</span></span><br><span class="line">        <span class="string">'dispatch_mode'</span> =&gt; <span class="number">1</span>,<span class="comment">//request轮询分配给每个worker进程</span></span><br><span class="line">    ]</span><br><span class="line">);</span><br><span class="line">$http-&gt;on(<span class="string">'request'</span>, <span class="function"><span class="keyword">function</span> <span class="params">($request, $response)</span> </span>&#123;</span><br><span class="line">    App::init($request, $response);<span class="comment">//必须放在最前面，不然下一个request可能取到上一个request的gpc</span></span><br><span class="line">    $result = (<span class="keyword">new</span> A())-&gt;run();<span class="comment">//调用实现类</span></span><br><span class="line">    $response-&gt;end(<span class="string">"子进程("</span> . getmypid() . <span class="string">")完成请求的处理："</span> . $result);<span class="comment">//request请求是在worker进程执行的</span></span><br><span class="line">&#125;);</span><br><span class="line">$http-&gt;start();</span><br><span class="line"><span class="keyword">echo</span> <span class="string">"主进程("</span> . getmypid() . <span class="string">")已启动"</span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 存放全局对象，进程内唯一，进程内全局</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">App</span></span></span><br><span class="line"><span class="class"></span>&#123;</span><br><span class="line">    <span class="comment">/**</span></span><br><span class="line"><span class="comment">     * <span class="doctag">@var</span> array 进程内的全局对象GPC</span></span><br><span class="line"><span class="comment">     */</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> $GPC;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="function"><span class="keyword">function</span> <span class="title">init</span><span class="params">($request, $response)</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        <span class="keyword">foreach</span> ([<span class="string">'get'</span>, <span class="string">'post'</span>, <span class="string">'cookie'</span>, <span class="string">'files'</span>] <span class="keyword">as</span> $attr) &#123;</span><br><span class="line">            <span class="keyword">self</span>::$GPC[$attr] = property_exists($request, $attr) ? $request-&gt;$attr : [];</span><br><span class="line">        &#125;</span><br><span class="line">        $response-&gt;header(<span class="string">"Content-Type"</span>, <span class="string">"text/html; charset=UTF-8"</span>);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/**</span></span><br><span class="line"><span class="comment"> * 在具体业务实现中取得全局对象</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">A</span></span></span><br><span class="line"><span class="class"></span>&#123;</span><br><span class="line">    <span class="keyword">public</span> <span class="function"><span class="keyword">function</span> <span class="title">run</span><span class="params">()</span></span></span><br><span class="line"><span class="function">    </span>&#123;</span><br><span class="line">        <span class="comment">//获取全局gpc对象</span></span><br><span class="line">        <span class="keyword">return</span> var_export(App::$GPC, <span class="keyword">true</span>);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
